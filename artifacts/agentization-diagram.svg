<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Agentization Diagram</title>
  <desc id="desc">Minimal Mermaid-like architecture with orthogonal arrows that terminate on node borders.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155" />
    </marker>
    <style><![CDATA[
      .bg { fill: #ffffff; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; rx: 10; ry: 10; }
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #64748b; }
      .groupTitle { font: 700 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 600 14px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #0f172a; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .edgeDashed { stroke: #475569; stroke-width: 1.6; fill: none; stroke-dasharray: 5 4; marker-end: url(#arrow); }
      .label { font: 500 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; fill: #475569; }
    ]]></style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900" />

  <text x="60" y="56" class="title">interview-online-codex: Agentization</text>
  <text x="60" y="82" class="subtitle">Mermaid-like layout: orthogonal connectors, clean spacing, border-anchored arrows</text>

  <rect class="group" x="50" y="110" width="720" height="760" rx="12" ry="12" />
  <text x="74" y="144" class="groupTitle">Governance and Delivery Agents</text>

  <rect class="node" x="90" y="200" width="110" height="56" />
  <text x="145" y="226" class="text">TZ</text>
  <text x="145" y="243" class="small">Specification</text>

  <rect class="node" x="230" y="200" width="110" height="56" />
  <text x="285" y="226" class="text">PO</text>
  <text x="285" y="243" class="small">Product</text>

  <rect class="node" x="370" y="200" width="110" height="56" />
  <text x="425" y="228" class="text">Architect</text>

  <rect class="node" x="510" y="200" width="110" height="56" />
  <text x="565" y="228" class="text">Team Lead</text>

  <rect class="node" x="650" y="200" width="110" height="56" />
  <text x="705" y="225" class="text">Executors</text>
  <text x="705" y="242" class="small">Dev / Design / QA</text>

  <path class="edge" d="M200 228 H230" />
  <path class="edge" d="M340 228 H370" />
  <path class="edge" d="M480 228 H510" />
  <path class="edge" d="M620 228 H650" />

  <rect class="node" x="120" y="390" width="180" height="56" />
  <text x="210" y="419" class="text">Prompt/Task Auditor</text>

  <rect class="node" x="320" y="390" width="180" height="56" />
  <text x="410" y="419" class="text">Solution Reviewer</text>

  <rect class="node" x="520" y="390" width="180" height="56" />
  <text x="610" y="413" class="text">Security &amp;</text>
  <text x="610" y="430" class="small">Reliability</text>

  <rect class="node" x="220" y="500" width="180" height="56" />
  <text x="310" y="529" class="text">UX Critic</text>

  <rect class="node" x="420" y="500" width="180" height="56" />
  <text x="510" y="529" class="text">Test Reviewer</text>

  <path class="edgeDashed" d="M565 256 V360 H210 V390" />
  <path class="edgeDashed" d="M705 256 V360 H410 V390" />
  <path class="edgeDashed" d="M705 256 V360 H610 V390" />
  <path class="edgeDashed" d="M705 256 V470 H310 V500" />
  <path class="edgeDashed" d="M705 256 V470 H510 V500" />

  <rect class="node" x="190" y="690" width="430" height="90" />
  <text x="405" y="724" class="text">Linear is mandatory task-state system</text>
  <text x="405" y="746" class="small">issues, statuses, handoff comments, review verdicts</text>

  <path class="edgeDashed" d="M285 256 V690" />
  <path class="edgeDashed" d="M565 256 V690" />
  <path class="edgeDashed" d="M510 556 V690" />

  <rect class="group" x="830" y="110" width="720" height="760" rx="12" ry="12" />
  <text x="854" y="144" class="groupTitle">Backend Runtime (Implemented MVP)</text>

  <rect class="node" x="890" y="200" width="180" height="60" />
  <text x="980" y="228" class="text">Frontend Agent Ops</text>
  <text x="980" y="246" class="small">start / transition / policy</text>

  <rect class="node" x="1110" y="200" width="230" height="60" />
  <text x="1225" y="228" class="text">WorkflowOrchestratorService</text>
  <text x="1225" y="246" class="small">run + transition + verdict + artifacts</text>

  <rect class="node" x="1380" y="200" width="140" height="60" />
  <text x="1450" y="228" class="text">Providers</text>
  <text x="1450" y="246" class="small">Temporal / LangGraph</text>

  <path class="edge" d="M1070 230 H1110" />
  <path class="edge" d="M1340 230 H1380" />

  <rect class="node" x="890" y="390" width="230" height="60" />
  <text x="1005" y="418" class="text">IndependentReviewerService</text>
  <text x="1005" y="436" class="small">execute reviewer stack</text>

  <rect class="node" x="1160" y="390" width="240" height="60" />
  <text x="1280" y="418" class="text">Reviewer runtimes</text>
  <text x="1280" y="436" class="small">SOLUTION / SECURITY / TEST / UX</text>

  <rect class="node" x="1440" y="390" width="100" height="60" />
  <text x="1490" y="418" class="text">PolicyGate</text>
  <text x="1490" y="436" class="small">QA/DONE</text>

  <path class="edge" d="M1225 260 V360 H1005 V390" />
  <path class="edge" d="M1120 420 H1160" />
  <path class="edge" d="M1400 420 H1440" />
  <path class="edge" d="M1280 390 V300 H1225 V260" />

  <rect class="node" x="960" y="610" width="220" height="60" />
  <text x="1070" y="638" class="text">Artifact Registry</text>
  <text x="1070" y="656" class="small">artifacts + verdicts + trace</text>

  <rect class="node" x="1220" y="610" width="230" height="60" />
  <text x="1335" y="638" class="text">LinearSyncService</text>
  <text x="1335" y="656" class="small">status + verdict comments</text>

  <path class="edgeDashed" d="M1225 260 V560 H1070 V610" />
  <path class="edgeDashed" d="M1225 260 V560 H1335 V610" />

  <rect class="node" x="1030" y="760" width="360" height="60" />
  <text x="1210" y="788" class="text">Transition guardrails</text>
  <text x="1210" y="806" class="small">human approval + required verdicts + linked artifacts</text>

  <path class="edge" d="M1490 450 V760 H1390" />
  <path class="edge" d="M1070 670 V760" />
  <path class="edge" d="M1335 670 V760" />

  <path class="edgeDashed" d="M620 735 H1030" />
  <text x="760" y="722" class="label">task-state sync into runtime orchestration</text>
</svg>
