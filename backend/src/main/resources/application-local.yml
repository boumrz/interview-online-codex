# Профиль без Docker: встроенная H2 в режиме совместимости с PostgreSQL.
# Запуск: spring-boot:run -Dspring-boot.run.profiles=local
# или: set SPRING_PROFILES_ACTIVE=local
server:
  port: 8080
spring:
  datasource:
    url: jdbc:h2:mem:interview_online;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
