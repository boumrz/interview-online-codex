server {
    listen 80;
    server_name interview.domiknote.ru;

    # Keep this template HTTP-only.
    # Run `certbot --nginx -d interview.domiknote.ru --redirect` after enabling the site.
    # Certbot will inject TLS directives and HTTPS redirect automatically.
    root /opt/interview-online/current/frontend/dist;
    index index.html;

    client_max_body_size 10m;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;
    # Optional (if nginx has ngx_brotli module enabled):
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css text/xml application/javascript application/json application/xml application/xml+rss image/svg+xml application/wasm;

    location /api/realtime/ {
        proxy_pass http://127.0.0.1:18080/api/realtime/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:18080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:18080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:18080/api/public/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
