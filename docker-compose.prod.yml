services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-online-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-interview}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-interview_online}
    volumes:
      - interview_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-interview} -d ${DB_NAME:-interview_online}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - interview_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interview-online-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-interview_online}
      DB_USER: ${DB_USER:-interview}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://interview.vtools.tech}
      AGENT_LINEAR_SYNC_ENABLED: ${AGENT_LINEAR_SYNC_ENABLED:-false}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_API_URL: ${LINEAR_API_URL:-https://api.linear.app/graphql}
      AGENT_LANGFUSE_ENABLED: ${AGENT_LANGFUSE_ENABLED:-false}
      AGENT_LANGFUSE_URL: ${AGENT_LANGFUSE_URL:-}
      AGENT_LANGFUSE_API_KEY: ${AGENT_LANGFUSE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - interview_net

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interview-online-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-interview.vtools.tech}
      INTERVIEW_SERVER_NAMES: ${INTERVIEW_SERVER_NAMES:-interview.vtools.tech}
      NGINX_SSL: ${NGINX_SSL:-false}
      FINANCE_PROXY_ENABLED: ${FINANCE_PROXY_ENABLED:-false}
      FINANCE_DOMAIN: ${FINANCE_DOMAIN:-domiknote.ru}
      FINANCE_CERT_DOMAIN: ${FINANCE_CERT_DOMAIN:-domiknote.ru}
      FINANCE_WEB_UPSTREAM: ${FINANCE_WEB_UPSTREAM:-finance-assistant-web-1:80}
    volumes:
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - interview_net

  certbot:
    image: certbot/certbot:latest
    container_name: interview-online-certbot
    profiles:
      - certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - interview_net

networks:
  interview_net:
    driver: bridge

volumes:
  interview_pgdata:
  certbot_www:
  certbot_certs:
