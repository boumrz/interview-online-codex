services:
  isolated-runner:
    build:
      context: ./runner
    container_name: interview-isolated-runner
    ports:
      - "7070:7070"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
